<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Исабаев Мухамед Камчыбекович</title>
  <meta property="og:title" content="Исабаев Мухамед Камчыбекович">
  <meta property="og:description" content="Начальник отдела по противодействию коррупции и надзора за исполнением законов прокуратуры г.Бишкек">
  <meta property="og:image" content="https://cardlink.github.io/y/photo.jpeg">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: 'Manrope', sans-serif;
      background: linear-gradient(145deg, #f3f3f3 0%, #ebebeb 45%, #f7f7f7 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #111;
    }

    .card {
      width: 100%;
      max-width: 430px;
      position: relative;
      overflow: hidden;
      border-radius: 34px;
      padding: 34px 24px 28px;
      background: linear-gradient(180deg, rgba(255,255,255,0.95), rgba(245,245,245,0.98));
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow:
        0 24px 70px rgba(0,0,0,0.08),
        inset 0 1px 0 rgba(255,255,255,0.95);
      text-align: center;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.55), transparent 18%),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,0.4), transparent 28%);
      pointer-events: none;
      z-index: 1;
    }

    .mvd-bg {
      position: absolute;
      top: 115px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      opacity: 0.09;
      filter: grayscale(100%) blur(0.2px);
      pointer-events: none;
      z-index: 0;
    }

    .top-row {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 22px;
    }

    .badge {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 999px;
      background: #f0f0f0;
      border: 1px solid rgba(0,0,0,0.05);
      color: #4d4d4d;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 6px 18px rgba(0,0,0,0.04);
    }

    .top-actions {
      display: flex;
      gap: 10px;
    }

    .top-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 14px;
      background: #f0f0f0;
      border: 1px solid rgba(0,0,0,0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 6px 18px rgba(0,0,0,0.04);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .top-btn:hover {
      transform: translateY(-1px);
      background: #ebebeb;
    }

    .photo-wrap {
      position: relative;
      z-index: 2;
      width: 156px;
      height: 156px;
      margin: 0 auto 24px;
      padding: 5px;
      border-radius: 50%;
      background: linear-gradient(145deg, #ffffff, #dddddd);
      box-shadow: 0 16px 36px rgba(0,0,0,0.11), 0 0 30px rgba(255,255,255,0.7);
    }

    .photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
      border: 3px solid #f5f5f5;
    }

    h1 {
      position: relative;
      z-index: 2;
      font-size: 38px;
      line-height: 1.03;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 10px;
      color: #111;
    }

    .role {
      position: relative;
      z-index: 2;
      font-size: 17px;
      font-weight: 700;
      color: #2f2f2f;
      margin-bottom: 26px;
    }

    .main-btn {
      position: relative;
      z-index: 2;
      display: block;
      width: 100%;
      padding: 18px;
      margin-bottom: 22px;
      border-radius: 22px;
      text-decoration: none;
      color: #fff;
      background: linear-gradient(180deg, #111111, #1f1f1f);
      font-size: 17px;
      font-weight: 800;
      box-shadow: 0 12px 24px rgba(0,0,0,0.14);
      transition: transform 0.2s ease;
    }

    .main-btn:hover {
      transform: translateY(-2px);
    }

    .actions {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 12px;
      margin-bottom: 18px;
    }

    .action {
      width: 104px;
      min-height: 106px;
      text-decoration: none;
      color: #111;
      border-radius: 22px;
      padding: 18px 10px 14px;
      background: linear-gradient(180deg, #f8f8f8, #efefef);
      border: 1px solid rgba(0,0,0,0.05);
      box-shadow: 0 8px 18px rgba(0,0,0,0.05), inset 0 1px 0 rgba(255,255,255,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      flex-shrink: 0;
    }

    .action:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.08), inset 0 1px 0 rgba(255,255,255,0.95);
    }

    .icon-svg {
      width: 24px;
      height: 24px;
      margin-bottom: 10px;
      stroke: #1a1a1a;
      stroke-width: 1.9;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: 0.95;
    }

    .label {
      font-size: 14px;
      font-weight: 600;
      color: #202020;
    }

    .qr {
      position: relative;
      z-index: 2;
      margin-top: 16px;
      display: none;
    }

    .qr img {
      width: 110px;
      height: 110px;
      border-radius: 12px;
      background: #fff;
      padding: 6px;
      box-shadow: 0 8px 18px rgba(0,0,0,0.07);
    }

    .footer {
      position: relative;
      z-index: 2;
      margin-top: 18px;
      color: #8a8a8a;
      font-size: 12px;
      font-weight: 500;
      line-height: 1.5;
    }

    @media (max-width: 480px) {
      .card {
        padding: 28px 18px 24px;
        border-radius: 28px;
      }

      .top-row {
        gap: 10px;
        align-items: flex-start;
      }

      .badge {
        font-size: 12px;
        padding: 10px 14px;
      }

      h1 {
        font-size: 34px;
      }

      .photo-wrap {
        width: 144px;
        height: 144px;
      }

      .actions {
        gap: 10px;
      }

      .action {
        width: calc((100% - 20px) / 3);
        min-width: 0;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="logo.jpg" alt="Логотип" class="mvd-bg">

    <div class="top-row">
      <div class="badge">Премиальная цифровая визитка</div>

      <div class="top-actions">
        <button class="top-btn" onclick="sharePage()" aria-label="Поделиться">
          <svg class="icon-svg" viewBox="0 0 24 24" style="margin-bottom:0; width:20px; height:20px;">
            <circle cx="18" cy="5" r="2"></circle>
            <circle cx="6" cy="12" r="2"></circle>
            <circle cx="18" cy="19" r="2"></circle>
            <path d="M8 12l8-6"></path>
            <path d="M8 12l8 6"></path>
          </svg>
        </button>

        <button class="top-btn" onclick="toggleQR()" aria-label="QR-код">
          <svg class="icon-svg" viewBox="0 0 24 24" style="margin-bottom:0; width:20px; height:20px;">
            <rect x="3" y="3" width="6" height="6"></rect>
            <rect x="15" y="3" width="6" height="6"></rect>
            <rect x="3" y="15" width="6" height="6"></rect>
            <path d="M15 15h3v3h-3z"></path>
            <path d="M18 18h3v3h-3z"></path>
            <path d="M18 15h3"></path>
            <path d="M15 18v3"></path>
          </svg>
        </button>
      </div>
    </div>

    <div class="photo-wrap">
      <img src="photo.jpeg" alt="Фото" class="photo">
    </div>

    <h1>Исабаев Мухамед <br>Камчыбекович</h1>

    <div class="role">Начальник отдела по противодействию коррупции и надзора за исполнением законов прокуратуры г.Бишкек</div>

    <a href="./contact.vcf" class="main-btn">Сохранить контакт</a>

    <div class="actions">
      <a href="tel:+996221044000" class="action">
        <svg class="icon-svg" viewBox="0 0 24 24">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.86 19.86 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.86 19.86 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.12.9.33 1.78.63 2.62a2 2 0 0 1-.45 2.11L8 9.91a16 16 0 0 0 6.09 6.09l1.46-1.29a2 2 0 0 1 2.11-.45c.84.3 1.72.51 2.62.63A2 2 0 0 1 22 16.92z"/>
        </svg>
        <div class="label">Звонок</div>
      </a>

      <a href="https://wa.me/996550488884?text=%D0%97%D0%B4%D1%80%D0%B0%D0%B2%D1%81%D1%82%D0%B2%D1%83%D0%B9%D1%82%D0%B5%2C%20%D0%98%D1%81%D0%B0%D0%B1%D0%B0%D0%B5%D0%B2%20%D0%9C%D1%83%D1%85%D0%B0%D0%BC%D0%B5%D0%B4%20%D0%9A%D0%B0%D0%BC%D1%87%D1%8B%D0%B1%D0%B5%D0%BA%D0%BE%D0%B2%D0%B8%D1%87" class="action" target="_blank">
        <svg class="icon-svg" viewBox="0 0 24 24">
          <path d="M21 12a8 8 0 1 1-3-6"></path>
          <path d="M8 21l1.5-3"></path>
        </svg>
        <div class="label">Сообщение</div>
      </a>

      <a href="mailto:Isabaev_m@bk.ru" class="action">
        <svg class="icon-svg" viewBox="0 0 24 24">
          <rect x="3" y="5" width="18" height="14" rx="2"></rect>
          <path d="M4 7l8 6 8-6"></path>
        </svg>
        <div class="label">Email</div>
      </a>
    </div>

    <div class="qr" id="qr">
      <img src="" id="qrImg" alt="QR-код">
    </div>

    <div class="footer">
      Быстрый доступ к контактам
    </div>
  </div>

  <script>
    function sharePage() {
      if (navigator.share) {
        navigator.share({
          title: 'Исабаев Мухамед Камчыбекович',
          url: window.location.href
        });
      } else {
        alert('Скопируйте ссылку: ' + window.location.href);
      }
    }

    function toggleQR() {
      const qr = document.getElementById('qr');
      const img = document.getElementById('qrImg');
      img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=' + encodeURIComponent(window.location.href);
      qr.style.display = qr.style.display === 'block' ? 'none' : 'block';
    }
  </script>
</body>
</html>
